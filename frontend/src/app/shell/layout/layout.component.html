<!-- Mobile backdrop -->
@if (sidebarService.isMobileOpen$ | async) {
<div class="fixed inset-0 z-40 bg-gray-900/50 xl:hidden" (click)="sidebarService.closeMobile()"></div>
}

<!-- Sidebar -->
<aside
  class="fixed flex flex-col top-0 px-5 left-0 bg-white dark:bg-gray-900 dark:border-gray-800 text-gray-900 h-screen transition-all duration-300 ease-in-out z-50 border-r border-gray-200"
  [ngClass]="{
    'w-[290px]': isExpanded || isMobileOpen || isHovered,
    'w-[90px]': !(isExpanded || isMobileOpen || isHovered),
    'translate-x-0': isMobileOpen,
    '-translate-x-full': !isMobileOpen,
    'xl:translate-x-0': true
  }"
  (mouseenter)="onSidebarHover(true)"
  (mouseleave)="onSidebarHover(false)"
>
  <!-- Logo -->
  <div class="py-8 flex" [ngClass]="{'xl:justify-center': !showFull, 'justify-start': showFull}">
    <a routerLink="/dashboard">
      @if (showFull) {
        <span class="text-xl font-bold text-brand-500">Savvy</span>
      } @else {
        <span class="text-xl font-bold text-brand-500">S</span>
      }
    </a>
  </div>

  <!-- Navigation -->
  <div class="flex flex-col overflow-y-auto duration-300 ease-linear flex-1 min-h-0 custom-scrollbar">
    <nav class="mb-6">
      <div class="flex flex-col gap-4">
        <!-- Menu section header -->
        <div>
          <h2 class="mb-4 text-xs uppercase flex leading-[20px] text-gray-400"
            [ngClass]="{'xl:justify-center': !showFull, 'justify-start': showFull}">
            @if (showFull) { Menu } @else {
              <svg class="size-6" viewBox="0 0 24 24" fill="none"><path fill-rule="evenodd" clip-rule="evenodd" d="M5.99915 10.2451C6.96564 10.2451 7.74915 11.0286 7.74915 11.9951V12.0051C7.74915 12.9716 6.96564 13.7551 5.99915 13.7551C5.03265 13.7551 4.24915 12.9716 4.24915 12.0051V11.9951C4.24915 11.0286 5.03265 10.2451 5.99915 10.2451ZM17.9991 10.2451C18.9656 10.2451 19.7491 11.0286 19.7491 11.9951V12.0051C19.7491 12.9716 18.9656 13.7551 17.9991 13.7551C17.0326 13.7551 16.2491 12.9716 16.2491 12.0051V11.9951C16.2491 11.0286 17.0326 10.2451 17.9991 10.2451ZM13.7491 11.9951C13.7491 11.0286 12.9656 10.2451 11.9991 10.2451C11.0326 10.2451 10.2491 11.0286 10.2491 11.9951V12.0051C10.2491 12.9716 11.0326 13.7551 11.9991 13.7551C12.9656 13.7551 13.7491 12.9716 13.7491 12.0051V11.9951Z" fill="currentColor"></path></svg>
            }
          </h2>

          <!-- Nav items -->
          <ul class="flex flex-col gap-1">
            <!-- Dashboard -->
            <li>
              <a routerLink="/dashboard" routerLinkActive="menu-item-active" [routerLinkActiveOptions]="{exact: true}"
                class="menu-item" [class.menu-item-inactive]="true"
                [ngClass]="{'xl:justify-center': !showFull, 'xl:justify-start': showFull}">
                <span class="menu-item-icon-size">
                  <svg class="size-6" viewBox="0 0 24 24" fill="none"><path d="M3 9L12 2L21 9V20C21 20.5304 20.7893 21.0391 20.4142 21.4142C20.0391 21.7893 19.5304 22 19 22H5C4.46957 22 3.96086 21.7893 3.58579 21.4142C3.21071 21.0391 3 20.5304 3 20V9Z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><path d="M9 22V12H15V22" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
                </span>
                @if (showFull) { <span class="menu-item-text">Dashboard</span> }
              </a>
            </li>

            <!-- SavvyChurch section -->
            <li>
              <button (click)="toggleChurchMenu()" class="menu-item group cursor-pointer"
                [class.menu-item-active]="churchMenuOpen" [class.menu-item-inactive]="!churchMenuOpen"
                [ngClass]="{'xl:justify-center': !showFull, 'xl:justify-start': showFull}">
                <span class="menu-item-icon-size" [class.menu-item-icon-active]="churchMenuOpen" [class.menu-item-icon-inactive]="!churchMenuOpen">
                  <svg class="size-6" viewBox="0 0 24 24" fill="none"><path d="M18 21V7L12 3L6 7V21" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><path d="M3 21H21" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><path d="M10 21V15H14V21" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><path d="M12 3V1" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
                </span>
                @if (showFull) {
                  <span class="menu-item-text">SavvyChurch</span>
                  <svg [ngClass]="{'rotate-180 text-brand-500': churchMenuOpen}" class="ml-auto w-5 h-5 transition-transform duration-200" viewBox="0 0 20 20" fill="none"><path d="M4.79175 7.396L10.0001 12.6043L15.2084 7.396" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
                }
              </button>
              @if (churchMenuOpen && showFull) {
              <div class="mt-1 ml-4 space-y-1">
                <a routerLink="/church/members" routerLinkActive="menu-dropdown-item-active" class="menu-dropdown-item" [class.menu-dropdown-item-inactive]="true">
                  <span class="w-1.5 h-1.5 rounded-full bg-gray-400"></span> Miembros
                </a>
                <a routerLink="/church/finance" routerLinkActive="menu-dropdown-item-active" class="menu-dropdown-item" [class.menu-dropdown-item-inactive]="true">
                  <span class="w-1.5 h-1.5 rounded-full bg-gray-400"></span> Finanzas
                </a>
                <a routerLink="/church/reports" routerLinkActive="menu-dropdown-item-active" class="menu-dropdown-item" [class.menu-dropdown-item-inactive]="true">
                  <span class="w-1.5 h-1.5 rounded-full bg-gray-400"></span> Reportes
                </a>
              </div>
              }
            </li>
          </ul>
        </div>
      </div>
    </nav>
  </div>

  <!-- Bottom: Theme toggle -->
  <div class="py-4 border-t border-gray-200 dark:border-gray-800">
    <app-theme-toggle />
  </div>
</aside>

<!-- Header -->
<header class="sticky top-0 z-40 flex items-center justify-between px-4 py-3 bg-white dark:bg-gray-900 border-b border-gray-200 dark:border-gray-800 transition-all duration-300"
  [ngClass]="{'xl:ml-[290px]': isExpanded || isHovered, 'xl:ml-[90px]': !(isExpanded || isHovered)}">

  <!-- Mobile menu button -->
  <button class="xl:hidden p-2 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-800" (click)="sidebarService.toggleMobileOpen()">
    <svg class="w-6 h-6 text-gray-700 dark:text-gray-300" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
  </button>

  <div class="flex-1"></div>

  <!-- User info -->
  <div class="flex items-center gap-4">
    <div class="text-right hidden sm:block">
      <p class="text-sm font-medium text-gray-700 dark:text-gray-200">{{ userName }}</p>
      <p class="text-xs text-gray-500 dark:text-gray-400">{{ orgName }}</p>
    </div>
    <button (click)="logout()" class="p-2 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-800 text-gray-500" title="Cerrar sesion">
      <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
    </button>
  </div>
</header>

<!-- Main content -->
<main class="transition-all duration-300 p-4 md:p-6"
  [ngClass]="{'xl:ml-[290px]': isExpanded || isHovered, 'xl:ml-[90px]': !(isExpanded || isHovered)}">
  <div class="mx-auto max-w-screen-2xl">
    <router-outlet />
  </div>
</main>

<!-- Global alert -->
<app-alert />
