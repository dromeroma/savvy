<div class="flex h-screen overflow-hidden bg-gray-50 dark:bg-gray-950">
  <!-- Sidebar + Backdrop -->
  <div>
    <app-sidebar />
    @if (isMobileOpen$ | async) {
      <div class="fixed inset-0 z-40 bg-gray-900/50 xl:hidden" (click)="sidebarService.closeMobile()"></div>
    }
  </div>

  <!-- Main area -->
  <div class="flex-1 overflow-y-auto transition-all duration-300 ease-in-out bg-gray-50 dark:bg-gray-900"
       [ngClass]="{
         'xl:ml-[290px]': (isExpanded$ | async),
         'xl:ml-[90px]': !(isExpanded$ | async)
       }">
    <!-- Header -->
    <header class="sticky top-0 z-40 flex items-center justify-between w-full bg-white dark:bg-gray-900 border-b border-gray-200 dark:border-gray-800">
      <div class="flex items-center justify-between w-full px-3 py-3 sm:px-4 lg:py-4 xl:px-6">
        <!-- Toggle button (hamburger / X) -->
        <button
          class="flex items-center justify-center w-10 h-10 text-gray-500 rounded-lg z-50 dark:text-gray-400 lg:h-11 lg:w-11 xl:border xl:border-gray-200 xl:dark:border-gray-800"
          [ngClass]="{'bg-gray-100 dark:bg-white/[0.03]': (isMobileOpen$ | async)}"
          (click)="handleToggle()">
          @if (isMobileOpen$ | async) {
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
              <path fill-rule="evenodd" clip-rule="evenodd" d="M6.21967 7.28131C5.92678 6.98841 5.92678 6.51354 6.21967 6.22065C6.51256 5.92775 6.98744 5.92775 7.28033 6.22065L11.999 10.9393L16.7176 6.22078C17.0105 5.92789 17.4854 5.92788 17.7782 6.22078C18.0711 6.51367 18.0711 6.98855 17.7782 7.28144L13.0597 12L17.7782 16.7186C18.0711 17.0115 18.0711 17.4863 17.7782 17.7792C17.4854 18.0721 17.0105 18.0721 16.7176 17.7792L11.999 13.0607L7.28033 17.7794C6.98744 18.0722 6.51256 18.0722 6.21967 17.7794C5.92678 17.4865 5.92678 17.0116 6.21967 16.7187L10.9384 12L6.21967 7.28131Z" fill="currentColor" />
            </svg>
          } @else {
            <svg width="16" height="12" viewBox="0 0 16 12" fill="none">
              <path fill-rule="evenodd" clip-rule="evenodd" d="M0.583252 1C0.583252 0.585788 0.919038 0.25 1.33325 0.25H14.6666C15.0808 0.25 15.4166 0.585786 15.4166 1C15.4166 1.41421 15.0808 1.75 14.6666 1.75L1.33325 1.75C0.919038 1.75 0.583252 1.41422 0.583252 1ZM0.583252 11C0.583252 10.5858 0.919038 10.25 1.33325 10.25L14.6666 10.25C15.0808 10.25 15.4166 10.5858 15.4166 11C15.4166 11.4142 15.0808 11.75 14.6666 11.75L1.33325 11.75C0.919038 11.75 0.583252 11.4142 0.583252 11ZM1.33325 5.25C0.919038 5.25 0.583252 5.58579 0.583252 6C0.583252 6.41421 0.919038 6.75 1.33325 6.75L7.99992 6.75C8.41413 6.75 8.74992 6.41421 8.74992 6C8.74992 5.58579 8.41413 5.25 7.99992 5.25L1.33325 5.25Z" fill="currentColor" />
            </svg>
          }
        </button>

        <div class="flex-1"></div>

        <!-- Right: theme toggle + user info + avatar + logout -->
        <div class="flex items-center gap-3">
          <!-- Theme toggle -->
          <app-theme-toggle />
          <!-- User name -->
          <div class="text-right hidden sm:block">
            <p class="text-sm font-medium text-gray-700 dark:text-gray-200">{{ userName }}</p>
            <p class="text-xs text-gray-500 dark:text-gray-400">{{ userEmail }}</p>
          </div>

          <!-- Avatar with initials -->
          <div class="relative flex items-center justify-center w-10 h-10 rounded-full bg-brand-500 text-white text-sm font-semibold shrink-0">
            {{ userInitials }}
          </div>

          <!-- Logout -->
          <button (click)="logout()" class="flex items-center justify-center w-10 h-10 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-800 text-gray-500 dark:text-gray-400" title="Cerrar sesión">
            <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
          </button>
        </div>
      </div>
    </header>

    <!-- Content -->
    <div class="relative p-4 mx-auto max-w-(--breakpoint-2xl) md:p-6">
      <router-outlet />
    </div>
  </div>
</div>

<app-alert />
