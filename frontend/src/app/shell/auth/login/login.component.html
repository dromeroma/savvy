<div class="min-h-screen flex items-center justify-center bg-gradient-to-br from-indigo-50 to-purple-100 px-4">
  <div class="w-full max-w-md">
    <!-- Logo -->
    <div class="text-center mb-8">
      <h1 class="text-4xl font-bold text-indigo-700">Savvy</h1>
      <p class="text-gray-500 mt-1">Plataforma de gestión inteligente</p>
    </div>

    <!-- Card -->
    <div class="bg-white rounded-2xl shadow-xl p-8">
      <h2 class="text-2xl font-semibold text-gray-800 mb-6">Iniciar Sesión</h2>

      @if (error()) {
        <div class="mb-4 p-3 bg-red-50 border border-red-200 text-red-700 rounded-lg text-sm">
          {{ error() }}
        </div>
      }

      <form (ngSubmit)="onSubmit()" class="space-y-5">
        <div>
          <label for="org_slug" class="block text-sm font-medium text-gray-700 mb-1">
            Organización
          </label>
          <input
            id="org_slug"
            type="text"
            [(ngModel)]="form.org_slug"
            name="org_slug"
            required
            placeholder="mi-organizacion"
            class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition"
          />
        </div>

        <div>
          <label for="email" class="block text-sm font-medium text-gray-700 mb-1">
            Correo electrónico
          </label>
          <input
            id="email"
            type="email"
            [(ngModel)]="form.email"
            name="email"
            required
            placeholder="tu@email.com"
            class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition"
          />
        </div>

        <div>
          <label for="password" class="block text-sm font-medium text-gray-700 mb-1">
            Contraseña
          </label>
          <input
            id="password"
            type="password"
            [(ngModel)]="form.password"
            name="password"
            required
            placeholder="••••••••"
            class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition"
          />
        </div>

        <button
          type="submit"
          [disabled]="loading()"
          class="w-full py-2.5 px-4 bg-indigo-600 hover:bg-indigo-700 disabled:bg-indigo-400 text-white font-medium rounded-lg transition duration-200 cursor-pointer disabled:cursor-not-allowed"
        >
          @if (loading()) {
            <span>Ingresando...</span>
          } @else {
            <span>Ingresar</span>
          }
        </button>
      </form>

      <p class="mt-6 text-center text-sm text-gray-500">
        ¿No tienes cuenta?
        <a routerLink="/auth/register" class="text-indigo-600 hover:text-indigo-800 font-medium">
          Regístrate aquí
        </a>
      </p>
    </div>
  </div>
</div>
