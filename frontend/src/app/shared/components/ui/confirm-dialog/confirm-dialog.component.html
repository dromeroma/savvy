@if (config(); as cfg) {
  <div class="fixed inset-0 z-[10001] overflow-y-auto">
    <!-- Backdrop -->
    <div class="fixed inset-0 h-full w-full bg-gray-400/50 backdrop-blur-[32px]"></div>

    <div class="flex min-h-full items-center justify-center p-4">
      <div class="relative w-full max-w-md rounded-3xl bg-white dark:bg-gray-900 p-6 sm:p-8 text-center">
        <!-- Icon -->
        <div class="mx-auto mb-5 flex h-16 w-16 items-center justify-center rounded-full"
          [class]="type === 'danger' ? 'bg-error-100 dark:bg-error-500/20' : type === 'warning' ? 'bg-warning-100 dark:bg-warning-500/20' : 'bg-brand-100 dark:bg-brand-500/20'">
          @if (type === 'danger') {
            <svg class="w-8 h-8 text-error-600 dark:text-error-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
            </svg>
          } @else if (type === 'warning') {
            <svg class="w-8 h-8 text-warning-600 dark:text-warning-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-2.5L13.732 4.5c-.77-.833-2.694-.833-3.464 0L3.34 16.5c-.77.833.192 2.5 1.732 2.5z" />
            </svg>
          } @else {
            <svg class="w-8 h-8 text-brand-600 dark:text-brand-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
            </svg>
          }
        </div>

        <!-- Title -->
        <h3 class="text-lg font-bold text-gray-800 dark:text-white/90 mb-2">{{ cfg.title }}</h3>

        <!-- Message -->
        <p class="text-sm text-gray-500 dark:text-gray-400 mb-6">{{ cfg.message }}</p>

        <!-- Buttons -->
        <div class="flex gap-3 justify-center">
          <button (click)="onCancel()"
            class="flex-1 px-5 py-2.5 text-sm font-medium text-gray-700 dark:text-gray-300 bg-white dark:bg-gray-800 ring-1 ring-inset ring-gray-300 dark:ring-gray-700 hover:bg-gray-50 dark:hover:bg-white/[0.03] rounded-lg transition">
            {{ cancelText }}
          </button>
          <button (click)="onConfirm()"
            class="flex-1 px-5 py-2.5 text-sm font-medium text-white rounded-lg transition shadow-theme-xs"
            [class]="type === 'danger' ? 'bg-error-500 hover:bg-error-600' : type === 'warning' ? 'bg-warning-500 hover:bg-warning-600' : 'bg-brand-500 hover:bg-brand-600'">
            {{ confirmText }}
          </button>
        </div>
      </div>
    </div>
  </div>
}
