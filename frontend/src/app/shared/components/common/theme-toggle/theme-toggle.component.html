<div class="relative flex items-center gap-2">
  <!-- Theme toggle button -->
  <button (click)="toggleTheme()"
    class="flex items-center justify-center w-10 h-10 rounded-full text-gray-500 hover:bg-gray-100 dark:hover:bg-gray-800 dark:text-gray-400 transition-colors"
    title="Cambiar tema">
    @if (mode === 'light') {
      <!-- Moon icon -->
      <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
      </svg>
    } @else if (mode === 'dark') {
      <!-- Sun icon -->
      <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="5"/>
        <line x1="12" y1="1" x2="12" y2="3"/>
        <line x1="12" y1="21" x2="12" y2="23"/>
        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
        <line x1="1" y1="12" x2="3" y2="12"/>
        <line x1="21" y1="12" x2="23" y2="12"/>
        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
      </svg>
    } @else {
      <!-- Palette icon -->
      <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="13.5" cy="6.5" r=".5" fill="currentColor"/>
        <circle cx="17.5" cy="10.5" r=".5" fill="currentColor"/>
        <circle cx="8.5" cy="7.5" r=".5" fill="currentColor"/>
        <circle cx="6.5" cy="12" r=".5" fill="currentColor"/>
        <path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10c.926 0 1.648-.746 1.648-1.688 0-.437-.18-.835-.437-1.125-.29-.289-.438-.652-.438-1.125a1.64 1.64 0 0 1 1.668-1.668h1.996c3.051 0 5.555-2.503 5.555-5.554C21.965 6.012 17.461 2 12 2z"/>
      </svg>
    }
  </button>

  <!-- Fun mode: palette picker toggle -->
  @if (mode === 'fun') {
  <button (click)="togglePalettePicker()"
    class="flex items-center justify-center w-8 h-8 rounded-full border-2 border-gray-200 dark:border-gray-700 transition-colors hover:border-brand-500"
    [style.background]="'linear-gradient(135deg, ' + palette.primary + ', ' + palette.accent + ')'"
    title="Elegir paleta">
  </button>
  }

  <!-- Palette picker dropdown -->
  @if (showPalettePicker) {
  <div class="absolute bottom-full left-0 mb-2 p-3 bg-white dark:bg-gray-800 rounded-xl shadow-theme-lg border border-gray-200 dark:border-gray-700 min-w-[200px]">
    <p class="text-xs font-medium text-gray-500 dark:text-gray-400 mb-2">Paletas</p>
    <div class="flex flex-wrap gap-2">
      @for (p of palettes; track p.id) {
      <button (click)="selectPalette(p)"
        class="w-8 h-8 rounded-full border-2 transition-transform hover:scale-110"
        [class.border-brand-500]="palette.id === p.id"
        [class.border-transparent]="palette.id !== p.id"
        [style.background]="'linear-gradient(135deg, ' + p.primary + ', ' + p.accent + ')'"
        [title]="p.label">
      </button>
      }
    </div>
  </div>
  }
</div>
